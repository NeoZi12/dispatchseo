# Publishes the self-host images to GHCR on every push to main, so
# `sh start.sh` can pull a prebuilt app instead of compiling Next.js on the
# user's machine (the Postiz model). While the repo is private the packages
# are private too - installs just fall back to building locally (start.sh
# handles the fallback); at the public flip, make both packages public and
# every install gets the fast path. Push-triggered, not scheduled, so it
# does not need the deploy-check outcome-report step.
name: publish-images

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/builder/**"
      - "src/**"
      - "public/**"
      - "supabase/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "postcss.config.mjs"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

concurrency:
  group: publish-images
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/neozi12/dispatchseo:latest
            ghcr.io/neozi12/dispatchseo:${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: docker/builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/neozi12/dispatchseo-builder:latest
            ghcr.io/neozi12/dispatchseo-builder:${{ github.sha }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder
